<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>캠페인 집행현황 아카이브</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f5; --surface: #ffffff; --surface2: #f2f1ef;
    --border: #e4e3e0; --border2: #d0cfc9;
    --text: #1a1a18; --text2: #5a5955; --text3: #9a9891;
    --accent: #2c5fbd; --accent-bg: #eef2fc;
    --green: #27500a; --green-bg: #eaf3de;
    --gray: #444441; --gray-bg: #e8e7e3;
    --font: 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2e2e2b;
      --border: #3a3a37; --border2: #4a4a47;
      --text: #f0eeea; --text2: #a8a69f; --text3: #6a6865;
      --accent: #7fa8f5; --accent-bg: #1e2a45;
      --green: #c0dd97; --green-bg: #1c2e0d;
      --gray: #c8c6be; --gray-bg: #2e2e2b;
    }
  }
  html { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; }
  .shell { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }
  .site-header {
    padding: 32px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .site-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .site-header p { font-size: 13px; color: var(--text3); margin-top: 3px; }
  .sync-btn {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--accent);
    background: var(--accent-bg); border: 1px solid transparent;
    padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; font-family: var(--font);
  }
  .sync-btn:hover { opacity: 0.75; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; }
  .stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .filter-bar {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px;
  }
  .filter-bar input, .filter-bar select {
    font-family: var(--font); font-size: 13px; color: var(--text); background: var(--surface2);
    border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; height: 34px; outline: none;
  }
  .filter-bar input { min-width: 200px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
  .reset-btn {
    font-family: var(--font); font-size: 13px; color: var(--text2); background: transparent;
    border: 1px solid var(--border2); border-radius: 7px; padding: 0 12px; height: 34px; cursor: pointer;
  }
  .reset-btn:hover { background: var(--surface2); }
  .table-meta { font-size: 13px; color: var(--text3); margin-bottom: 8px; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 960px; }
  thead th {
    background: var(--surface2); color: var(--text2); font-weight: 500; font-size: 12px;
    padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 14px; vertical-align: middle; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
  .badge-종료 { background: var(--gray-bg); color: var(--gray); }
  .badge-진행중 { background: var(--green-bg); color: var(--green); }
  .badge-예정 { background: var(--accent-bg); color: var(--accent); }
  .badge-대행사 { background: #EEEDFE; color: #3C3489; }
  .badge-직접 { background: #E1F5EE; color: #085041; }
  @media (prefers-color-scheme: dark) {
    .badge-대행사 { background: #26215C; color: #AFA9EC; }
    .badge-직접 { background: #04342C; color: #5DCAA5; }
  }
  .arr { font-size: 10px; opacity: 0.45; margin-left: 2px; }
  .msg-row td { text-align: center; padding: 48px; color: var(--text3); font-size: 14px; }
  .error-box {
    background: #fff0f0; border: 1px solid #fcc; border-radius: 10px;
    padding: 20px 24px; margin-bottom: 20px; font-size: 13px; color: #a32d2d; line-height: 1.8;
  }
  @media (prefers-color-scheme: dark) { .error-box { background: #2a1515; border-color: #5a2020; color: #f09595; } }
  .error-box strong { display: block; font-size: 14px; margin-bottom: 6px; }
  .site-footer {
    margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text3); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .site-footer a { color: var(--accent); text-decoration: none; }
  .site-footer a:hover { text-decoration: underline; }
  .chart-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px 20px 16px; margin-bottom: 24px;
  }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .chart-year-tabs { display: flex; gap: 6px; }
  .chart-year-tab { font-family: var(--font); font-size: 12px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .chart-year-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chart-canvas-wrap { position: relative; height: 200px; }
  @media (max-width: 640px) {
    .site-header { flex-direction: column; align-items: flex-start; }
    .filter-bar input { min-width: 100%; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="shell">
  <header class="site-header">
    <div>
      <h1>캠페인 집행현황 아카이브</h1>
      <p id="last-updated">데이터를 불러오는 중...</p>
    </div>
    <button class="sync-btn" onclick="fetchData()">↻ 새로고침</button>
  </header>

  <div id="error-area"></div>

  <div class="stats">
    <div class="stat"><div class="stat-label">전체 캠페인</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">진행중</div><div class="stat-value" id="s-active">—</div></div>
    <div class="stat"><div class="stat-label">총 집행예산</div><div class="stat-value" id="s-budget">—</div></div>
    <div class="stat"><div class="stat-label">광고주 수</div><div class="stat-value" id="s-clients">—</div></div>
    <div class="stat"><div class="stat-label">세금계산서 발행 예산</div><div class="stat-value" id="s-taxbudget">—</div></div>
  </div>


  <div class="chart-wrap">
    <div class="chart-title">
      <span>월별 광고비 집행 현황</span>
      <div class="chart-year-tabs" id="year-tabs"></div>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="budget-chart"></canvas>
    </div>
  </div>

  <div class="filter-bar">
    <input type="search" id="f-search" placeholder="캠페인명 / 광고주 검색..." />
    <select id="f-status"><option value="">전체 상태</option></select>
    <select id="f-client"><option value="">전체 광고주</option></select>
    <select id="f-year"><option value="">전체 연도</option></select>
    <select id="f-type"><option value="">전체 거래분류</option></select>
    <select id="f-taxmonth"><option value="">전체 세금계산서 월</option></select>
    <button class="reset-btn" onclick="resetFilters()">초기화</button>
  </div>

  <div class="table-meta" id="row-count"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('상태')" style="width:72px">상태 <span class="arr" id="arr-상태"></span></th>
          <th onclick="sortBy('광고주')" style="width:110px">광고주 <span class="arr" id="arr-광고주"></span></th>
          <th onclick="sortBy('캠페인')" style="width:180px">캠페인 <span class="arr" id="arr-캠페인"></span></th>
          <th onclick="sortBy('대행사')" style="width:90px">대행사 <span class="arr" id="arr-대행사"></span></th>
          <th onclick="sortBy('예산')" style="width:130px; text-align:right">예산(VAT별도) <span class="arr" id="arr-예산"></span></th>
          <th onclick="sortBy('시작일')" style="width:175px">집행기간 <span class="arr" id="arr-시작일"></span></th>
          <th onclick="sortBy('시작연도')" style="width:75px">시작연도 <span class="arr" id="arr-시작연도"></span></th>
          <th onclick="sortBy('시작월')" style="width:50px">월 <span class="arr" id="arr-시작월"></span></th>
          <th onclick="sortBy('세금계산서 발행연도')" style="width:95px">세금계산서 연도 <span class="arr" id="arr-세금계산서 발행연도"></span></th>
          <th onclick="sortBy('세금계산서 발행월')" style="width:75px">세금계산서 월 <span class="arr" id="arr-세금계산서 발행월"></span></th>
          <th onclick="sortBy('거래분류')" style="width:75px">거래분류 <span class="arr" id="arr-거래분류"></span></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="msg-row"><td colspan="11">데이터를 불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <footer class="site-footer">
    <span>구글 시트 실시간 연동 · 5분마다 자동 갱신</span>
    <a href="https://docs.google.com/spreadsheets/d/1Ws-y_U8DUfpqNTXRRVigwCvPSkmU3_a7_ifrrSSYwqo/edit" target="_blank" rel="noopener">원본 시트 열기 ↗</a>
  </footer>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwFWH5DF7J_UEfq1bGc1H-CTI1hgMOR1_tamrlo7SI6Smr5EfgCFOxKmEWd5g9fKZk/exec';

let allData = [];
let sortKey = '시작일';
let sortDir = -1;

async function fetchData() {
  document.getElementById('last-updated').textContent = '데이터를 불러오는 중...';
  document.getElementById('error-area').innerHTML = '';
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!Array.isArray(json)) throw new Error('데이터 형식 오류');

    allData = json.filter(r => r['광고주'] || r['캠페인']);

    const now = new Date().toLocaleString('ko-KR', { month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
    document.getElementById('last-updated').textContent = `마지막 업데이트 ${now} · 구글 시트 실시간 연동`;
    populateFilters();
    render();
  } catch(e) {
    document.getElementById('last-updated').textContent = '데이터 로드 실패';
    document.getElementById('error-area').innerHTML = `
      <div class="error-box">
        <strong>데이터를 불러오지 못했습니다 (${e.message})</strong>
        Apps Script 배포 설정에서 액세스를 "모든 사용자"로 설정했는지 확인해 주세요.
      </div>`;
    document.getElementById('table-body').innerHTML = '<tr class="msg-row"><td colspan="11">데이터 없음</td></tr>';
  }
}

function getVal(row, key) {
  return row[key] !== undefined && row[key] !== null ? String(row[key]) : '';
}

function findVal(row, ...keywords) {
  // 키 이름에 모든 키워드가 포함된 컬럼을 찾음
  const key = Object.keys(row).find(k => keywords.every(kw => k.includes(kw)));
  if (!key) return '';
  return row[key] !== undefined && row[key] !== null ? String(row[key]) : '';
}

function populateFilters() {
  const add = (id, key) => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    [...new Set(allData.map(d => getVal(d, key)).filter(Boolean))].sort().forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v; sel.appendChild(o);
    });
    sel.value = cur;
  };
  add('f-status', '상태');
  add('f-client', '광고주');
  add('f-year',   '시작연도');
  add('f-type',   '거래분류');

  // 세금계산서 발행월 필터 (숫자 정렬)
  const taxMonthSel = document.getElementById('f-taxmonth');
  const curTax = taxMonthSel.value;
  while (taxMonthSel.options.length > 1) taxMonthSel.remove(1);
  const taxMonths = [...new Set(allData.map(d => {
    return findVal(d, '세금계산서', '발행월') || findVal(d, '세금계산서발행월') || findVal(d, '세금계산서 발행월');
  }).filter(Boolean))].sort((a,b) => parseFloat(a)-parseFloat(b));
  taxMonths.forEach(v => {
    const o = document.createElement('option');
    const label = String(v).replace(/월$/, '') + '월';
    o.value = v; o.textContent = label; taxMonthSel.appendChild(o);
  });
  taxMonthSel.value = curTax;
}

function getFiltered() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const status = document.getElementById('f-status').value;
  const client = document.getElementById('f-client').value;
  const year   = document.getElementById('f-year').value;
  const type     = document.getElementById('f-type').value;
  const taxmonth = document.getElementById('f-taxmonth').value;

  return allData.filter(d => {
    const c = getVal(d, '광고주').toLowerCase();
    const p = getVal(d, '캠페인').toLowerCase();
    if (search && !c.includes(search) && !p.includes(search)) return false;
    if (status && getVal(d, '상태')    !== status) return false;
    if (client && getVal(d, '광고주')  !== client) return false;
    if (type   && getVal(d, '거래분류') !== type)   return false;
    if (taxmonth) {
      const tm = findVal(d, '세금계산서', '발행월') || findVal(d, '세금계산서발행월') || findVal(d, '세금계산서 발행월');
      if (tm !== taxmonth) return false;
      // 세금계산서 월 필터가 켜지면, 연도 필터는 "세금계산서 발행연도" 기준으로 적용
      if (year) {
        const ty = findVal(d, '세금계산서', '발행연도') || findVal(d, '세금계산서발행연도') || findVal(d, '세금계산서 발행연도');
        if (ty !== year) return false;
      }
    } else {
      if (year && getVal(d, '시작연도') !== year) return false;
    }
    return true;
  }).sort((a, b) => {
    let av = getVal(a, sortKey), bv = getVal(b, sortKey);
    const numKeys = ['예산(VAT별도)', '예산', '시작월', '세금계산서 발행월', '시작연도', '세금계산서 발행연도'];
    if (numKeys.includes(sortKey)) {
      av = parseFloat(String(av).replace(/[^0-9.]/g,'')) || 0;
      bv = parseFloat(String(bv).replace(/[^0-9.]/g,'')) || 0;
    }
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
}

function updateStats(data) {
  const d = data || allData;
  document.getElementById('s-total').textContent = d.length.toLocaleString();
  document.getElementById('s-active').textContent = d.filter(r => getVal(r,'상태') === '진행중').length.toLocaleString();

  const budgetKey = Object.keys(allData[0] || {}).find(k => k.includes('예산')) || '예산(VAT별도)';
  const total = d.reduce((acc, r) => {
    return acc + (parseFloat(String(getVal(r, budgetKey)).replace(/[^0-9.]/g,'')) || 0);
  }, 0);
  document.getElementById('s-budget').textContent = total >= 100000000
    ? Math.round(total / 100000000) + '억'
    : Math.round(total / 10000) + '만';
  document.getElementById('s-clients').textContent = new Set(d.map(r => getVal(r,'광고주')).filter(Boolean)).size;

  // 세금계산서 발행월 기준 예산 합계
  const taxTotal = d.filter(r => {
    const ty = findVal(r, '세금계산서', '발행연도') || findVal(r, '세금계산서발행연도') || findVal(r, '세금계산서 발행연도');
    const tm = findVal(r, '세금계산서', '발행월') || findVal(r, '세금계산서발행월') || findVal(r, '세금계산서 발행월');
    return ty && tm;
  }).reduce((acc, r) => {
    return acc + (parseFloat(String(getVal(r, budgetKey)).replace(/[^0-9.]/g,'')) || 0);
  }, 0);
  document.getElementById('s-taxbudget').textContent = taxTotal >= 100000000
    ? Math.round(taxTotal / 100000000) + '억'
    : Math.round(taxTotal / 10000) + '만';
}

function fmtBudget(d) {
  const budgetKey = Object.keys(d).find(k => k.includes('예산')) || '예산(VAT별도)';
  const n = parseFloat(String(getVal(d, budgetKey)).replace(/[^0-9.]/g,''));
  return n ? n.toLocaleString('ko-KR') : '-';
}

function fmtDate(raw) {
  if (!raw) return '-';
  const s = String(raw);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  return s;
}

function fmtPeriod(d) {
  const s = fmtDate(getVal(d, '시작일'));
  const e = fmtDate(getVal(d, '종료일'));
  if (s !== '-' && e !== '-') return `${s} ~ ${e}`;
  return s !== '-' ? s : '-';
}

function render() {
  const data = getFiltered();
  updateStats(data);
  buildChart(data);
  document.getElementById('row-count').textContent = `${data.length.toLocaleString()}개 캠페인`;
  const tbody = document.getElementById('table-body');
  if (!data.length) {
    tbody.innerHTML = '<tr class="msg-row"><td colspan="11">조건에 맞는 캠페인이 없습니다.</td></tr>';
    return;
  }

  // 첫 행으로 실제 컬럼명 확인
  const sample = data[0];
  const keys = Object.keys(sample);
  console.log('컬럼명:', keys);

  tbody.innerHTML = data.map(d => {
    const st = getVal(d,'상태');
    const ty = getVal(d,'거래분류');
    const badgeSt = st ? `<span class="badge badge-${st}">${st}</span>` : '-';
    const badgeTy = ty ? `<span class="badge badge-${ty}">${ty}</span>` : '-';
    const period = fmtPeriod(d);
    const budget = fmtBudget(d);
    const client   = getVal(d,'광고주');
    const campaign = getVal(d,'캠페인');
    const agency   = getVal(d,'대행사');
    const year     = getVal(d,'시작연도');
    const month    = getVal(d,'시작월');
    const taxYear  = findVal(d, '세금계산서', '발행연도') || findVal(d, '세금계산서발행연도') || findVal(d, '세금계산서 발행연도');
    const taxMonth = findVal(d, '세금계산서', '발행월') || findVal(d, '세금계산서발행월') || findVal(d, '세금계산서 발행월');
    return `<tr>
      <td>${badgeSt}</td>
      <td title="${client}">${client||'-'}</td>
      <td title="${campaign}">${campaign||'-'}</td>
      <td title="${agency}">${agency||'-'}</td>
      <td class="num">${budget}</td>
      <td title="${period}">${period}</td>
      <td>${year||'-'}</td>
      <td>${month||'-'}</td>
      <td>${taxYear||'-'}</td>
      <td>${taxMonth||'-'}</td>
      <td>${badgeTy}</td>
    </tr>`;
  }).join('');
}

function sortBy(key) {
  sortDir = sortKey === key ? sortDir * -1 : -1;
  sortKey = key;
  document.querySelectorAll('.arr').forEach(el => el.textContent = '');
  const el = document.getElementById('arr-' + key);
  if (el) el.textContent = sortDir === -1 ? ' ↓' : ' ↑';
  render();
}

function resetFilters() {
  document.getElementById('f-search').value = '';
  ['f-status','f-client','f-year','f-type','f-taxmonth'].forEach(id => document.getElementById(id).selectedIndex = 0);
  render();
}

['f-search','f-status','f-client','f-year','f-type','f-taxmonth'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

let budgetChart = null;
let chartYear = null;

function buildChart(data) {
  const years = [...new Set(data.map(d => getVal(d,'시작연도')).filter(Boolean))].sort();
  if (!chartYear || !years.includes(chartYear)) chartYear = years[years.length - 1] || null;

  // Year tabs
  const tabsEl = document.getElementById('year-tabs');
  tabsEl.innerHTML = years.map(y =>
    `<button class="chart-year-tab${y === chartYear ? ' active' : ''}" onclick="setChartYear('${y}')">${y}</button>`
  ).join('');

  const budgetKey = Object.keys(data[0] || allData[0] || {}).find(k => k.includes('예산')) || '예산(VAT별도)';
  const monthlyData = {};
  for (let m = 1; m <= 12; m++) monthlyData[m] = 0;

  data.filter(d => getVal(d,'시작연도') === chartYear).forEach(d => {
    const m = parseInt(getVal(d,'시작월'));
    const b = parseFloat(String(getVal(d, budgetKey)).replace(/[^0-9.]/g,'')) || 0;
    if (m >= 1 && m <= 12) monthlyData[m] += b;
  });

  const labels = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const values = Object.values(monthlyData);
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const barColor = isDark ? 'rgba(127,168,245,0.8)' : 'rgba(44,95,189,0.75)';
  const barHover = isDark ? 'rgba(127,168,245,1)' : 'rgba(44,95,189,1)';
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#6a6865' : '#9a9891';

  if (budgetChart) budgetChart.destroy();
  const ctx = document.getElementById('budget-chart').getContext('2d');
  budgetChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: barColor,
        hoverBackgroundColor: barHover,
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v >= 100000000) return ` ${(v/100000000).toFixed(1)}억원`;
              if (v >= 10000) return ` ${Math.round(v/10000)}만원`;
              return ` ${v.toLocaleString()}원`;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: textColor, font: { size: 11 } } },
        y: {
          grid: { color: gridColor },
          ticks: {
            color: textColor, font: { size: 11 },
            callback: v => v >= 100000000 ? (v/100000000).toFixed(0)+'억' : v >= 10000 ? (v/10000).toFixed(0)+'만' : v
          }
        }
      }
    }
  });
}

function setChartYear(year) {
  chartYear = year;
  buildChart(getFiltered());
}

fetchData();
setInterval(fetchData, 5 * 60 * 1000);
</script>
</body>
</html>
